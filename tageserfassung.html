<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BackKI – Tageserfassung</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:     #1A120A;
  --crust:   #B8722A;
  --crust-l: #D4903E;
  --dough:   #F9F3E8;
  --cream:   #FDFAF4;
  --smoke:   #7A6A58;
  --border:  #E4D8C4;
  --green:   #2B6845;
  --green-l: #EBF5EF;
  --red:     #A82820;
  --red-l:   #FDECEA;
  --white:   #FFFFFF;
}

body { font-family: "Inter", sans-serif; background: var(--dough); color: var(--ink); min-height: 100vh; }

/* NAV */
nav {
  background: rgba(26,18,10,0.97);
  padding: 0 20px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.nav-logo { font-family: "Fraunces", serif; font-size: 20px; font-weight: 900; color: #fff; text-decoration: none; }
.nav-logo em { color: var(--crust); font-style: normal; }
.nav-back {
  font-size: 12px; color: rgba(255,255,255,0.5);
  text-decoration: none; font-weight: 500;
  display: flex; align-items: center; gap: 6px;
}
.nav-back:hover { color: #fff; }

/* CONTAINER */
.container { max-width: 480px; margin: 0 auto; padding: 20px 16px 100px; }

/* HEADER KARTE */
.tages-header {
  background: var(--ink); border-radius: 14px;
  padding: 20px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 16px;
}
.tages-header-left { flex: 1; }
.tages-greeting { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.35); margin-bottom: 3px; }
.tages-title { font-family: "Fraunces", serif; font-size: 20px; font-weight: 900; color: #fff; line-height: 1.2; }
.tages-sub { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 3px; }
.tages-total { text-align: center; flex-shrink: 0; }
.tages-total-val { font-family: "Fraunces", serif; font-size: 36px; font-weight: 900; color: var(--crust-l); line-height: 1; }
.tages-total-label { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }

/* ALLE NULL */
.alle-null-btn {
  width: 100%; background: none;
  border: 1.5px dashed var(--border); border-radius: 10px;
  padding: 10px; font-size: 13px; color: var(--smoke);
  font-family: "Inter", sans-serif; cursor: pointer;
  margin-bottom: 16px; transition: all 0.2s;
}
.alle-null-btn:hover { border-color: var(--green); color: var(--green); }

/* KATEGORIE */
.kategorie { margin-bottom: 10px; }

.kat-header {
  display: flex; align-items: center; gap: 10px;
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  cursor: pointer; transition: border-color 0.2s;
  user-select: none;
}
.kat-header:hover { border-color: var(--crust); }
.kat-header.offen { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-color: var(--crust); }

.kat-icon { font-size: 18px; flex-shrink: 0; }
.kat-name { font-family: "Fraunces", serif; font-size: 15px; font-weight: 700; color: var(--ink); flex: 1; }
.kat-verlust { font-size: 13px; font-weight: 700; color: var(--red); }
.kat-verlust.zero { color: var(--green); }
.kat-pfeil { font-size: 12px; color: var(--smoke); transition: transform 0.25s; flex-shrink: 0; }
.kat-header.offen .kat-pfeil { transform: rotate(180deg); }

.kat-body {
  display: none;
  background: var(--white);
  border: 1.5px solid var(--crust);
  border-top: none;
  border-bottom-left-radius: 10px;
  border-bottom-right-radius: 10px;
  overflow: hidden;
}
.kat-body.offen { display: block; }

/* PRODUKT ZEILE */
.produkt-zeile {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.produkt-zeile:last-child { border-bottom: none; }
.produkt-zeile.kein-retoure { background: var(--green-l); }

.pz-info { flex: 1; min-width: 0; }
.pz-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.pz-baseline { font-size: 11px; color: var(--smoke); }

.pz-stepper { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
.pz-btn {
  width: 34px; height: 34px; border: none;
  background: var(--dough); font-size: 18px; font-weight: 700;
  cursor: pointer; color: var(--ink); display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.pz-btn:active { background: var(--border); }
.pz-val {
  width: 40px; height: 34px; border: none;
  border-left: 1.5px solid var(--border); border-right: 1.5px solid var(--border);
  text-align: center; font-size: 15px; font-weight: 700;
  color: var(--ink); font-family: "Inter", sans-serif;
  background: var(--white);
}
.pz-val:focus { outline: none; }

.pz-verlust { min-width: 60px; text-align: right; font-size: 12px; font-weight: 700; color: var(--red); }
.pz-verlust.zero { color: var(--green); font-size: 16px; }

/* ABSCHLUSS */
.abschluss {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 18px; margin-top: 16px;
}
.ab-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--smoke); margin-bottom: 12px; }
.ab-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.ab-row:last-child { border-bottom: none; }
.ab-val { font-weight: 700; }
.ab-val.red { color: var(--red); }
.ab-val.green { color: var(--green); }
.ab-val.crust { color: var(--crust); }

/* MOTIVATION */
.motivation {
  border-radius: 10px; padding: 14px 16px;
  margin-top: 12px; font-size: 13px; line-height: 1.6;
  display: none; gap: 10px; align-items: flex-start;
}
.motivation.show { display: flex; }
.motivation.gut { background: var(--green-l); border: 1.5px solid #B8E0C8; color: var(--green); }
.motivation.mittel { background: #FEF9E7; border: 1.5px solid #F0D080; color: #B8860B; }
.motivation.schlecht { background: var(--red-l); border: 1.5px solid #F0B8B4; color: var(--red); }

/* SPEICHERN */
.btn-speichern {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px); max-width: 448px;
  background: var(--crust); color: white; border: none;
  border-radius: 12px; padding: 18px;
  font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: "Inter", sans-serif;
  box-shadow: 0 4px 20px rgba(184,114,42,0.4);
  transition: background 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-speichern:hover { background: var(--crust-l); }

/* SUCCESS OVERLAY */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(26,18,10,0.85); z-index: 200;
  align-items: center; justify-content: center;
}
.overlay.show { display: flex; }
.modal {
  background: var(--white); border-radius: 20px;
  padding: 36px 28px; text-align: center;
  max-width: 340px; width: 90%;
  animation: popIn 0.3s ease;
}
@keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-icon { font-size: 48px; margin-bottom: 12px; }
.modal-title { font-family: "Fraunces", serif; font-size: 22px; font-weight: 900; color: var(--ink); margin-bottom: 8px; }
.modal-verlust { font-family: "Fraunces", serif; font-size: 40px; font-weight: 900; color: var(--red); margin: 8px 0 4px; }
.modal-sub { font-size: 13px; color: var(--smoke); line-height: 1.6; margin-bottom: 20px; }
.modal-btn { background: var(--crust); color: white; border: none; border-radius: 10px; padding: 14px 28px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: "Inter", sans-serif; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">← Startseite</a>
  <a href="index.html" class="nav-logo">Back<em>KI</em></a>
  <div style="width:80px"></div>
</nav>

<div class="container">

  <div class="tages-header">
    <div class="tages-header-left">
      <div class="tages-greeting" id="greeting">Guten Morgen</div>
      <div class="tages-title">Was ist heute<br>übrig geblieben?</div>
      <div class="tages-sub">30 Sekunden genügen.</div>
    </div>
    <div class="tages-total">
      <div class="tages-total-val" id="total-val">0 €</div>
      <div class="tages-total-label">Verlust heute</div>
    </div>
  </div>

  <button class="alle-null-btn" onclick="alleNull()">✓ Alles verkauft — heute null Retouren</button>

  <div id="sortiment"></div>

  <div class="abschluss" id="abschluss" style="display:none">
    <div class="ab-title">Tagesabschluss</div>
    <div class="ab-row"><span style="color:var(--smoke)">Verlust heute</span><span class="ab-val red" id="ab-heute">0,00 €</span></div>
    <div class="ab-row"><span style="color:var(--smoke)">Hochrechnung Monat</span><span class="ab-val red" id="ab-monat">0,00 €</span></div>
    <div class="ab-row"><span style="color:var(--smoke)">Größter Posten</span><span class="ab-val crust" id="ab-worst">—</span></div>
    <div class="ab-row"><span style="color:var(--smoke)">Beste Kategorie</span><span class="ab-val green" id="ab-best">—</span></div>
    <div class="motivation" id="motivation"></div>
  </div>

</div>

<button class="btn-speichern" id="btn-speichern" onclick="speichern()">
  <span>✓</span> Tag abschließen & speichern
</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-icon">📊</div>
    <div class="modal-title">Tag gespeichert!</div>
    <div class="modal-verlust" id="modal-verlust">0,00 €</div>
    <div class="modal-sub" id="modal-sub">BackKI lernt mit jedem Tag dazu.</div>
    <button class="modal-btn" onclick="closeModal()">Weiter →</button>
  </div>
</div>

<script>
var PRODUKTE = [
  { kat:"Brot",             icon:"🍞", name:"Roggenbrot",      preis:3.20, baseline:15 },
  { kat:"Brot",             icon:"🍞", name:"Vollkornbrot",    preis:3.50, baseline:10 },
  { kat:"Brot",             icon:"🍞", name:"Weißbrot",        preis:2.80, baseline:8  },
  { kat:"Brötchen",         icon:"🥖", name:"Semmel",          preis:0.40, baseline:120 },
  { kat:"Brötchen",         icon:"🥖", name:"Laugenbrötchen",  preis:0.60, baseline:40 },
  { kat:"Belegte Brötchen", icon:"🥪", name:"Käsebrötchen",    preis:2.50, baseline:25 },
  { kat:"Belegte Brötchen", icon:"🥪", name:"Wurstbrötchen",   preis:2.80, baseline:20 },
  { kat:"Kuchen",           icon:"🎂", name:"Käsekuchen",      preis:2.80, baseline:12 },
  { kat:"Kuchen",           icon:"🎂", name:"Streuselkuchen",  preis:2.20, baseline:10 },
  { kat:"Süße Stückle",     icon:"🥐", name:"Berliner",        preis:0.90, baseline:50 },
  { kat:"Süße Stückle",     icon:"🥐", name:"Croissant",       preis:1.20, baseline:30 },
  { kat:"Brezel",           icon:"🥨", name:"Laugenbrezel",    preis:0.75, baseline:60 },
];

var retouren = {};
PRODUKTE.forEach(function(p) { retouren[p.name] = 0; });

// Begrüßung
var h = new Date().getHours();
document.getElementById("greeting").textContent =
  h < 11 ? "Guten Morgen" : h < 14 ? "Guten Mittag" : h < 18 ? "Guten Nachmittag" : "Guten Abend";

// Kategorien rendern
function render() {
  var kats = [];
  PRODUKTE.forEach(function(p) { if (!kats.includes(p.kat)) kats.push(p.kat); });
  var el = document.getElementById("sortiment");
  el.innerHTML = "";

  kats.forEach(function(kat, idx) {
    var prods = PRODUKTE.filter(function(p) { return p.kat === kat; });
    var icon  = prods[0].icon;
    var id    = "kat-" + idx;

    var div = document.createElement("div");
    div.className = "kategorie";
    div.innerHTML =
      "<div class=\"kat-header\" id=\"h-" + id + "\" onclick=\"toggleKat('" + id + "')\">" +
        "<span class=\"kat-icon\">" + icon + "</span>" +
        "<span class=\"kat-name\">" + kat + "</span>" +
        "<span class=\"kat-verlust zero\" id=\"v-" + id + "\">✓</span>" +
        "<span class=\"kat-pfeil\">▼</span>" +
      "</div>" +
      "<div class=\"kat-body\" id=\"b-" + id + "\"></div>";
    el.appendChild(div);

    var body = document.getElementById("b-" + id);
    prods.forEach(function(p) {
      var pid = p.name.replace(/\s/g,"_");
      var row = document.createElement("div");
      row.className = "produkt-zeile kein-retoure";
      row.id = "row-" + pid;
      row.innerHTML =
        "<div class=\"pz-info\">" +
          "<div class=\"pz-name\">" + p.name + "</div>" +
          "<div class=\"pz-baseline\">Baseline: " + p.baseline + " Stück · " + p.preis.toFixed(2).replace(".",",") + " €</div>" +
        "</div>" +
        "<div class=\"pz-stepper\">" +
          "<button class=\"pz-btn\" onclick=\"step('" + p.name + "',-1)\">−</button>" +
          "<input class=\"pz-val\" type=\"number\" min=\"0\" value=\"0\" id=\"val-" + pid + "\" onchange=\"setVal('" + p.name + "',this.value)\">" +
          "<button class=\"pz-btn\" onclick=\"step('" + p.name + "',1)\">+</button>" +
        "</div>" +
        "<div class=\"pz-verlust zero\" id=\"vl-" + pid + "\">✓</div>";
      body.appendChild(row);
    });
  });
}

function toggleKat(id) {
  var h = document.getElementById("h-" + id);
  var b = document.getElementById("b-" + id);
  h.classList.toggle("offen");
  b.classList.toggle("offen");
}

function step(name, delta) {
  var pid   = name.replace(/\s/g,"_");
  var input = document.getElementById("val-" + pid);
  var val   = Math.max(0, (parseInt(input.value) || 0) + delta);
  input.value = val;
  retouren[name] = val;
  updateZeile(name);
  updateTotals();
}

function setVal(name, val) {
  retouren[name] = Math.max(0, parseInt(val) || 0);
  updateZeile(name);
  updateTotals();
}

function updateZeile(name) {
  var p   = PRODUKTE.find(function(x) { return x.name === name; });
  var pid = name.replace(/\s/g,"_");
  var val = retouren[name];
  var eur = val * p.preis;
  var row = document.getElementById("row-" + pid);
  var vl  = document.getElementById("vl-" + pid);
  if (val === 0) {
    row.className = "produkt-zeile kein-retoure";
    vl.className  = "pz-verlust zero"; vl.textContent = "✓";
  } else {
    row.className = "produkt-zeile";
    vl.className  = "pz-verlust";
    vl.textContent = "−" + eur.toFixed(2).replace(".",",") + " €";
  }
}

function updateTotals() {
  var gesamt = 0;
  var katVerluste = {};
  var worst = null; var worstVal = 0;

  // Kategorien-Verluste
  var kats = [];
  PRODUKTE.forEach(function(p) { if (!kats.includes(p.kat)) kats.push(p.kat); });
  kats.forEach(function(kat, idx) {
    var katSum = 0;
    PRODUKTE.filter(function(p) { return p.kat === kat; }).forEach(function(p) {
      var v = retouren[p.name] * p.preis;
      katSum += v; gesamt += v;
      if (v > worstVal) { worstVal = v; worst = p.name; }
    });
    var id = "kat-" + idx;
    var el = document.getElementById("v-" + id);
    if (el) {
      el.textContent = katSum > 0 ? "−" + katSum.toFixed(2).replace(".",",") + " €" : "✓";
      el.className   = "kat-verlust" + (katSum > 0 ? "" : " zero");
    }
  });

  // Header
  document.getElementById("total-val").textContent = gesamt.toFixed(2).replace(".",",") + " €";

  // Abschluss einblenden wenn Eingaben da
  var hatEingabe = Object.values(retouren).some(function(v) { return v > 0; });
  document.getElementById("abschluss").style.display = "block";

  document.getElementById("ab-heute").textContent  = gesamt.toFixed(2).replace(".",",") + " €";
  document.getElementById("ab-monat").textContent  = (gesamt * 26).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,".") + " €";
  document.getElementById("ab-worst").textContent  = worst ? worst + " (−" + worstVal.toFixed(2).replace(".",",") + " €)" : "—";

  // Motivation
  var mot = document.getElementById("motivation");
  var quote = gesamt > 0 ? Math.round(gesamt / PRODUKTE.reduce(function(s,p) { return s + p.baseline * p.preis; }, 0) * 100) : 0;
  if (gesamt === 0) {
    mot.className = "motivation gut show";
    mot.innerHTML = "🏆 <span><strong>Perfekter Tag!</strong> Alles verkauft — das ist Ihr Ziel.</span>";
  } else if (quote < 10) {
    mot.className = "motivation gut show";
    mot.innerHTML = "👍 <span><strong>Sehr guter Tag.</strong> Retourenquote unter 10 % — BackKI sieht einen positiven Trend.</span>";
  } else if (quote < 20) {
    mot.className = "motivation mittel show";
    mot.innerHTML = "📈 <span><strong>Im grünen Bereich.</strong> Mit weiteren Daten gibt BackKI gezielte Empfehlungen.</span>";
  } else {
    mot.className = "motivation schlecht show";
    mot.innerHTML = "⚠️ <span><strong>Hohe Retourenquote.</strong> BackKI merkt sich das — nach 7 Tagen folgt eine Empfehlung.</span>";
  }

  // Beste Kategorie
  var besteKat = null; var besteVal = Infinity;
  kats.forEach(function(kat) {
    var sum = PRODUKTE.filter(function(p) { return p.kat === kat; }).reduce(function(s,p) { return s + retouren[p.name] * p.preis; }, 0);
    if (sum < besteVal) { besteVal = sum; besteKat = kat; }
  });
  document.getElementById("ab-best").textContent = besteKat ? besteKat + " (✓ " + besteVal.toFixed(2).replace(".",",") + " €)" : "—";
}

function alleNull() {
  PRODUKTE.forEach(function(p) {
    retouren[p.name] = 0;
    document.getElementById("val-" + p.name.replace(/\s/g,"_")).value = 0;
    updateZeile(p.name);
  });
  updateTotals();
}

function speichern() {
  var gesamt = Object.keys(retouren).reduce(function(s, name) {
    var p = PRODUKTE.find(function(x) { return x.name === name; });
    return s + retouren[name] * p.preis;
  }, 0);
  document.getElementById("modal-verlust").textContent = gesamt.toFixed(2).replace(".",",") + " €";
  var msg = gesamt === 0 ? "Perfekter Tag — kein Wegwurf! 🏆" :
            gesamt < 20  ? "Sehr guter Tag — unter 20 € Verlust." :
            "BackKI lernt aus diesem Tag. Nach 7 Tagen folgt die erste Empfehlung.";
  document.getElementById("modal-sub").textContent = msg;
  document.getElementById("overlay").classList.add("show");
}

function closeModal() {
  document.getElementById("overlay").classList.remove("show");
  // TODO: Supabase speichern
}

render();
updateTotals();
</script>
</body>
</html>
